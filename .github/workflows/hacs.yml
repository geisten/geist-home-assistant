name: HACS and Hassfest

on:
  pull_request:
    paths:
      - "custom_components/**"
      - "hacs.json"
      - ".github/workflows/hacs.yml"
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - "hacs.json"
      - ".github/workflows/hacs.yml"

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main 2026-07-12
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master 2026-07-12

  disposable-ha:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Must equal compatibility.json homeassistant.tested (enforced by
        # tests/test_compatibility.py): minimum first, current stable last.
        ha_version: ["2026.6.1", "2026.7.3"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install and upgrade package in Home Assistant ${{ matrix.ha_version }}
        env:
          HA_IMAGE: ghcr.io/home-assistant/home-assistant:${{ matrix.ha_version }}
        run: tests/test_hacs_ha_container.sh
