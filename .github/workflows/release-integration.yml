name: Release integration

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(jq -r .version custom_components/geist_conversation/manifest.json)
          test "$TAG" = "v$version"
      - name: Build HACS artifact
        run: scripts/build-integration-zip.sh geist_conversation.zip
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" geist_conversation.zip --generate-notes --verify-tag
